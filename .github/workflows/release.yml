name: release

# Tag a version (e.g. `git tag v0.1.0 && git push origin v0.1.0`) → this creates a
# GitHub Release, then builds the `vyer` binary for every platform and attaches the
# archives (+ sha256) to it. Those archives are what `npx @vyer/cli`, the Homebrew
# formula, and the "download a prebuilt binary" path all consume.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Create the Release first — the upload action below attaches assets to it but does
  # not create it (without this the uploads loop on "release not found" and fail).
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --title "Vyer $GITHUB_REF_NAME" --generate-notes

  upload:
    needs: create-release
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-13
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      # Builds `--bin vyer` for the target (cross-compiling where needed), packages it
      # as vyer-<tag>-<target>.(tar.gz|zip), emits a .sha256, and uploads to the Release.
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: vyer
          target: ${{ matrix.target }}
          archive: vyer-$tag-$target
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
